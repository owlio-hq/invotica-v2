<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Invotica — Custom websites for Canadian businesses">
  <!-- background -->
  <rect width="1200" height="630" fill="#0039C7"/>

  <!-- subtle grid -->
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- logo mark: two skewed rounded rects (matches public/logo-white.svg) -->
  <!-- upper rect: white, skewX(-18) -->
  <g transform="translate(80,110) skewX(-18)">
    <rect width="72" height="42" rx="14" fill="#ffffff"/>
  </g>
  <!-- lower rect: lime, skewX(-18) -->
  <g transform="translate(98,158) skewX(-18)">
    <rect width="72" height="42" rx="14" fill="#AFFE08"/>
  </g>

  <!-- wordmark -->
  <text x="210" y="196" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" fill="#ffffff" letter-spacing="-3">invotica</text>

  <!-- divider -->
  <rect x="80" y="250" width="1040" height="2" fill="rgba(255,255,255,0.15)"/>

  <!-- headline -->
  <text x="80" y="360" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">Custom websites for</text>
  <text x="80" y="448" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">Canadian businesses.</text>

  <!-- subline -->
  <text x="80" y="510" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="rgba(255,255,255,0.65)">Built fast, built to convert.</text>

  <!-- lime pill badge -->
  <rect x="80" y="548" width="240" height="52" rx="26" fill="#AFFE08"/>
  <text x="200" y="581" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1a2a0d" text-anchor="middle" letter-spacing="0.5">invotica.com</text>
</svg>
